<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>渠道报价单 · 香薰雕刻蜡烛</title>
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body data-page="quotation">
  <main class="prototype-page">
    <section class="phone-shell" aria-label="渠道报价单页面视觉稿">
      <div class="wx-status"><span>11:26</span><span class="wx-dots"><span></span><span></span><span></span></span></div>
      <header class="wx-header">
        <a class="icon-button" href="wholesale.html" aria-label="返回批发页"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="m15 18-6-6 6-6"/></svg></a>
        <div>
          <h1>渠道报价单</h1>
          <span class="subtle-title">价格 · 起订 · 包装</span>
        </div>
        <div class="capsule" aria-label="微信胶囊按钮">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="5" cy="12" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="19" cy="12" r="1.5"/></svg>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="8"/></svg>
        </div>
      </header>

      <div class="screen-scroll has-cta">
        <section class="growth-hero light">
          <p class="eyebrow" style="color: var(--berry);">WHOLESALE QUOTE</p>
          <h2>给渠道客户一个清晰但不公开裸价的报价视图。</h2>
          <p>报价按款式、数量、包装确认。页面用于视觉稿演示，最终仍由顾问确认。</p>
          <div class="hero-stat-row">
            <div class="hero-stat"><strong>¥55±</strong><span>参考拿货价</span></div>
            <div class="hero-stat"><strong>30 支</strong><span>建议起订</span></div>
            <div class="hero-stat"><strong>3 档</strong><span>包装方案</span></div>
          </div>
        </section>

        <section class="section">
          <div class="section-head">
            <h2 class="section-title serif">报价明细</h2>
            <span class="section-note">静态示意</span>
          </div>
          <div class="quote-card">
            <div class="quote-row"><strong>入门单品</strong><span>30 支起</span><b>¥55</b></div>
            <div class="quote-row"><strong>标准礼盒</strong><span>20 套起</span><b>¥86</b></div>
            <div class="quote-row"><strong>节日组合</strong><span>12 套起</span><b>¥128</b></div>
            <div class="quote-row"><strong>陈列套组</strong><span>6 组起</span><b>¥660</b></div>
          </div>
        </section>

        <section class="section">
          <div class="section-head">
            <h2 class="section-title serif">包装选项</h2>
          </div>
          <div class="choice-grid" data-choice-group>
            <button class="choice-card" data-choice aria-pressed="true"><strong>防损基础包装</strong><span>适合拿样和门店试卖，默认加固外箱。</span></button>
            <button class="choice-card" data-choice aria-pressed="false"><strong>硬质礼盒包装</strong><span>适合零售陈列，可搭配空白贺卡。</span></button>
            <button class="choice-card" data-choice aria-pressed="false"><strong>节日套装包装</strong><span>适合节点活动和企业礼品采购。</span></button>
          </div>
        </section>

        <section class="section">
          <form class="form-card">
            <div class="field"><label for="quote-name">联系人</label><input id="quote-name" autocomplete="name" placeholder="请输入姓名"></div>
            <div class="field"><label for="quote-type">渠道类型</label><select id="quote-type"><option>礼品店 / 生活方式店</option><option>花店 / 婚庆</option><option>民宿 / 酒店</option><option>企业礼品</option></select></div>
            <div class="field"><label for="quote-count">预计数量</label><input id="quote-count" inputmode="numeric" placeholder="例如：60 支"></div>
          </form>
        </section>
      </div>

      <div class="sticky-cta">
        <a class="btn ghost" href="assets-download.html">下载素材</a>
        <button class="btn primary" data-toast="已模拟提交：顾问将确认正式报价">生成报价单</button>
      </div>
      <div class="toast" data-toast-host role="status" aria-live="polite"></div>
    </section>
  </main>
  <script src="assets/app.js"></script>
</body>
</html>
