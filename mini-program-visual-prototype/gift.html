<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>选礼 · 香薰雕刻蜡烛</title>
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body data-page="gift">
  <main class="prototype-page">
    <section class="phone-shell" aria-label="选礼页面视觉稿">
      <div class="wx-status"><span>11:26</span><span class="wx-dots"><span></span><span></span><span></span></span></div>
      <header class="wx-header">
        <a class="icon-button" href="home.html" aria-label="返回首页"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="m15 18-6-6 6-6"/></svg></a>
        <div>
          <h1>选礼助手</h1>
          <span class="subtle-title">三步推荐</span>
        </div>
        <div class="capsule" aria-label="微信胶囊按钮">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="5" cy="12" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="19" cy="12" r="1.5"/></svg>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="8"/></svg>
        </div>
      </header>

      <div class="screen-scroll">
        <section class="gift-hero">
          <p class="eyebrow" style="color: var(--berry);">GIFT FINDER</p>
          <h2>不用懂蜡烛，也能选到体面的礼。</h2>
          <p>把选择题缩短为预算、用途、色系。适合第一次接触雕刻蜡烛的用户，也方便客服二次跟进。</p>
          <div class="progress-line" aria-hidden="true">
            <span class="progress-step active"></span>
            <span class="progress-step active"></span>
            <span class="progress-step"></span>
          </div>
        </section>

        <section class="section">
          <div class="section-head">
            <h2 class="section-title">1. 预算范围</h2>
            <span class="section-note">零售价格段清晰</span>
          </div>
          <div class="choice-grid two" data-choice-group>
            <button class="choice-card" data-choice aria-pressed="false"><strong>¥200-300</strong><span>入门礼品，适合生日和答谢。</span></button>
            <button class="choice-card" data-choice aria-pressed="true"><strong>¥300-500</strong><span>标准礼盒，最稳妥的送礼档。</span></button>
            <button class="choice-card" data-choice aria-pressed="false"><strong>¥500-700</strong><span>高级系列，适合重要关系。</span></button>
            <button class="choice-card" data-choice aria-pressed="false"><strong>¥700-900</strong><span>大尺寸陈列，适合空间礼。</span></button>
          </div>
        </section>

        <section class="section">
          <div class="section-head">
            <h2 class="section-title">2. 使用场景</h2>
          </div>
          <div class="choice-grid" data-choice-group>
            <button class="choice-card" data-choice aria-pressed="true"><strong>生日 / 节日送礼</strong><span>优先推荐礼盒、贺卡、不过分挑人的色系。</span></button>
            <button class="choice-card" data-choice aria-pressed="false"><strong>婚礼 / 活动伴手礼</strong><span>推荐成套色系，方便批量统一陈列。</span></button>
            <button class="choice-card" data-choice aria-pressed="false"><strong>民宿 / 门店陈列</strong><span>优先推荐视觉冲击强、尺寸更大的款式。</span></button>
          </div>
        </section>

        <section class="section">
          <div class="section-head">
            <h2 class="section-title">3. 喜欢的色系</h2>
          </div>
          <div class="swatch-row" data-choice-group>
            <button class="swatch" data-choice aria-pressed="true" aria-label="莓红象牙色" style="background: linear-gradient(135deg,#fff5e6 0 40%,#8a1238 41% 76%,#f3d991 77%);"></button>
            <button class="swatch" data-choice aria-pressed="false" aria-label="金蓝象牙色" style="background: linear-gradient(135deg,#fffefa 0 38%,#d6a645 39% 66%,#9ebbd2 67%);"></button>
            <button class="swatch" data-choice aria-pressed="false" aria-label="青绿象牙色" style="background: linear-gradient(135deg,#fffefa 0 38%,#0f766e 39% 70%,#22577a 71%);"></button>
            <button class="swatch" data-choice aria-pressed="false" aria-label="黑金灰色" style="background: linear-gradient(135deg,#f4efe6 0 33%,#1f1b19 34% 68%,#a16207 69%);"></button>
            <button class="swatch" data-choice aria-pressed="false" aria-label="粉白色" style="background: linear-gradient(135deg,#fff7f2 0 35%,#d96c86 36% 70%,#fffefa 71%);"></button>
          </div>
        </section>

        <section class="section">
          <div class="section-head">
            <h2 class="section-title serif">推荐结果</h2>
            <a class="link-small" href="product.html">看详情</a>
          </div>
          <a class="recommend-card" href="product.html">
            <div class="product-media photo-media contain"><img src="assets/product-berry-candle.png" alt="推荐款莓红象牙雕刻蜡烛"></div>
            <div class="recommend-info">
              <div class="tag-row"><span class="tag berry">最稳妥</span><span class="tag">礼盒可选</span></div>
              <h3>莓果洛可可 · 标准礼盒</h3>
              <p>莓红与象牙色对比强，适合生日、节日和仪式感场景。可附空白贺卡。</p>
              <div class="price-line">¥328 <small>中号起</small></div>
            </div>
          </a>
          <p class="note-line">不确定色系时，推荐先进入详情页点击“问搭配顾问”，比让用户自己翻完整列表更容易成交。</p>
        </section>
      </div>

      <nav class="tabbar" aria-label="底部导航">
        <a class="tab-item" data-tab="home" href="home.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="m3 11 9-8 9 8"/><path d="M5 10v10h14V10"/></svg><span>首页</span></a>
        <a class="tab-item" data-tab="gift" href="gift.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M20 12v8H4v-8"/><path d="M2 7h20v5H2z"/><path d="M12 22V7"/></svg><span>选礼</span></a>
        <a class="tab-item" data-tab="wholesale" href="wholesale.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 7h18v13H3z"/><path d="M7 7V4h10v3"/></svg><span>批发</span></a>
        <a class="tab-item" data-tab="cart" href="cart.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="9" cy="20" r="1"/><circle cx="17" cy="20" r="1"/><path d="M3 4h2l3 12h10l3-8H7"/></svg><span>购物车</span></a>
        <a class="tab-item" data-tab="mine" href="mine.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="8" r="4"/><path d="M4 22a8 8 0 0 1 16 0"/></svg><span>我的</span></a>
      </nav>
    </section>
  </main>
  <script src="assets/app.js"></script>
</body>
</html>
