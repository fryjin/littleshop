<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>婚礼批量采购 · 香薰雕刻蜡烛</title>
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body data-page="wedding">
  <main class="prototype-page">
    <section class="phone-shell" aria-label="婚礼批量采购页面视觉稿">
      <div class="wx-status"><span>11:26</span><span class="wx-dots"><span></span><span></span><span></span></span></div>
      <header class="wx-header">
        <a class="icon-button" href="home.html" aria-label="返回首页"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="m15 18-6-6 6-6"/></svg></a>
        <div>
          <h1>婚礼采购</h1>
          <span class="subtle-title">桌礼 · 伴手礼 · 陈列</span>
        </div>
        <div class="capsule" aria-label="微信胶囊按钮">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="5" cy="12" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="19" cy="12" r="1.5"/></svg>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="8"/></svg>
        </div>
      </header>

      <div class="screen-scroll has-cta">
        <section class="growth-hero light">
          <p class="eyebrow" style="color: var(--berry);">WEDDING GIFTING</p>
          <h2>让婚礼伴手礼，拥有能被带回家的陈列价值。</h2>
          <p>面向婚庆、花艺和新人采购，先选择数量、预算和色系，再由顾问确认报价。</p>
          <div class="hero-stat-row">
            <div class="hero-stat"><strong>30+</strong><span>建议数量</span></div>
            <div class="hero-stat"><strong>3 档</strong><span>婚礼场景</span></div>
            <div class="hero-stat"><strong>顾问</strong><span>确认报价</span></div>
          </div>
        </section>

        <section class="section">
          <div class="section-head">
            <h2 class="section-title serif">婚礼方案</h2>
          </div>
          <div class="choice-grid" data-choice-group>
            <button class="choice-card" data-choice aria-pressed="true"><strong>桌礼点缀</strong><span>每桌 1-2 支，强调仪式感和拍照效果。</span></button>
            <button class="choice-card" data-choice aria-pressed="false"><strong>宾客伴手礼</strong><span>小号或中号组合，适合统一包装和贺卡。</span></button>
            <button class="choice-card" data-choice aria-pressed="false"><strong>迎宾区陈列</strong><span>大尺寸与成套色系，形成入口视觉焦点。</span></button>
          </div>
        </section>

        <section class="section">
          <div class="activity-card">
            <div>
              <div class="tag-row"><span class="tag berry">推荐色系</span><span class="tag">婚礼</span></div>
              <h3>象牙金蓝 · 伴手礼组合</h3>
              <p>更温和稳妥，适合白金、蓝金和花艺场景。</p>
              <div class="price-line">¥3300 <small>/ 60 支参考</small></div>
            </div>
            <img src="assets/gift-box-candle.png" alt="婚礼批量采购礼盒组合">
          </div>
        </section>

        <section class="section">
          <form class="form-card">
            <div class="field"><label for="wedding-count">预计数量</label><input id="wedding-count" inputmode="numeric" placeholder="例如：60 支"></div>
            <div class="field"><label for="wedding-budget">预算区间</label><select id="wedding-budget"><option>¥3000-5000</option><option>¥5000-8000</option><option>¥8000 以上</option></select></div>
            <div class="field"><label for="wedding-date">婚礼日期</label><input id="wedding-date" placeholder="例如：2026 年 10 月"></div>
          </form>
        </section>
      </div>

      <div class="sticky-cta">
        <a class="btn ghost" href="quotation.html">看批量报价</a>
        <button class="btn primary" data-toast="已模拟提交：顾问将确认婚礼批量方案">提交采购咨询</button>
      </div>
      <div class="toast" data-toast-host role="status" aria-live="polite"></div>
    </section>
  </main>
  <script src="assets/app.js"></script>
</body>
</html>
