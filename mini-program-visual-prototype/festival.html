<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>节日活动 · 香薰雕刻蜡烛</title>
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body data-page="festival">
  <main class="prototype-page">
    <section class="phone-shell" aria-label="节日活动页面视觉稿">
      <div class="wx-status"><span>11:26</span><span class="wx-dots"><span></span><span></span><span></span></span></div>
      <header class="wx-header">
        <a class="icon-button" href="home.html" aria-label="返回首页"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="m15 18-6-6 6-6"/></svg></a>
        <div>
          <h1>节日礼盒季</h1>
          <span class="subtle-title">预算 · 场景 · 礼盒</span>
        </div>
        <div class="capsule" aria-label="微信胶囊按钮">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="5" cy="12" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="19" cy="12" r="1.5"/></svg>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="8"/></svg>
        </div>
      </header>

      <div class="screen-scroll has-cta">
        <section class="growth-hero photo-festival">
          <p class="eyebrow">FESTIVAL EDITION</p>
          <h2>把节日礼物，做成能被摆出来的仪式感。</h2>
          <p>按预算和收礼关系分组，降低选择成本，也给客服留出顾问入口。</p>
          <div class="hero-stat-row">
            <div class="hero-stat"><strong>3 档</strong><span>预算组合</span></div>
            <div class="hero-stat"><strong>48h</strong><span>默认发货</span></div>
            <div class="hero-stat"><strong>贺卡</strong><span>可选服务</span></div>
          </div>
        </section>

        <section class="section">
          <div class="section-head">
            <h2 class="section-title serif">按预算选礼</h2>
          </div>
          <div class="segmented" data-choice-group>
            <button class="segment active" data-choice aria-pressed="true">¥300-500</button>
            <button class="segment" data-choice aria-pressed="false">¥500-700</button>
            <button class="segment" data-choice aria-pressed="false">¥700-900</button>
          </div>
          <div class="activity-card" style="margin-top: 12px;">
            <div>
              <div class="tag-row"><span class="tag berry">本周主推</span><span class="tag">标准礼盒</span></div>
              <h3>莓果洛可可节日礼盒</h3>
              <p>适合生日、答谢和朋友节日赠礼，可附空白贺卡。</p>
              <div class="price-line">¥328 <small>起</small></div>
            </div>
            <img src="assets/product-berry-candle.png" alt="节日活动莓果洛可可礼盒">
          </div>
        </section>

        <section class="section">
          <div class="section-head">
            <h2 class="section-title serif">场景组合</h2>
            <a class="link-small" href="gift.html#scene">用选礼助手</a>
          </div>
          <div class="feature-grid">
            <a class="feature-card" href="custom.html"><strong>写给重要的人</strong><span>定制贺卡、色系和香型，保留仪式感。</span><small>定制</small></a>
            <a class="feature-card" href="wedding.html"><strong>批量伴手礼</strong><span>婚礼和活动场景，按数量试算预算。</span><small>批量</small></a>
            <a class="feature-card dark" href="service.html"><strong>不确定怎么选</strong><span>直接交给搭配顾问，先问关系和预算。</span><small>顾问</small></a>
            <a class="feature-card" href="coupons.html"><strong>复购优惠</strong><span>会员可先领节日礼盒复购券。</span><small>券包</small></a>
          </div>
        </section>
      </div>

      <div class="sticky-cta">
        <a class="btn ghost" href="service.html">问顾问</a>
        <a class="btn primary" href="product.html">查看主推礼盒</a>
      </div>
      <div class="toast" data-toast-host role="status" aria-live="polite"></div>
    </section>
  </main>
  <script src="assets/app.js"></script>
</body>
</html>
