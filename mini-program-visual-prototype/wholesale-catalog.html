<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>批发商品 · 香薰雕刻蜡烛</title>
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body data-page="wholesale">
  <main class="prototype-page">
    <section class="phone-shell" aria-label="批发商品页面视觉稿">
      <div class="wx-status"><span>11:26</span><span class="wx-dots"><span></span><span></span><span></span></span></div>
      <header class="wx-header">
        <a class="icon-button" href="wholesale.html" aria-label="返回批发页"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="m15 18-6-6 6-6"/></svg></a>
        <div>
          <h1>批发商品</h1>
          <span class="subtle-title">渠道身份后可见</span>
        </div>
        <div class="capsule" aria-label="微信胶囊按钮">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="5" cy="12" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="19" cy="12" r="1.5"/></svg>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="8"/></svg>
        </div>
      </header>

      <div class="screen-scroll">
        <section class="section catalog-section">
          <div class="channel-note">
            <strong>渠道专属</strong>
            <span>经典系列仅对批发客户开放，渠道价、起订量和包装费用由顾问确认。</span>
          </div>

          <div class="section-head">
            <h2 class="section-title serif">批发系列</h2>
            <a class="link-small" href="quotation.html">申请报价</a>
          </div>

          <div class="series-grid" data-series-tabs aria-label="批发商品系列">
            <button class="series-card active" type="button" data-series-card="classic" aria-pressed="true">
              <span class="series-kicker">8 色</span>
              <strong>经典</strong>
              <small>批发专属</small>
            </button>
            <button class="series-card" type="button" data-series-card="advanced" aria-pressed="false">
              <span class="series-kicker">19 色</span>
              <strong>进阶</strong>
              <small>渠道可采</small>
            </button>
            <button class="series-card" type="button" data-series-card="artisan" aria-pressed="false">
              <span class="series-kicker">73 色</span>
              <strong>匠作</strong>
              <small>渠道可采</small>
            </button>
            <button class="series-card" type="button" data-series-card="festival" aria-pressed="false">
              <span class="series-kicker">16 色</span>
              <strong>节日</strong>
              <small>包装手选</small>
            </button>
          </div>

          <div class="series-detail active" data-series-panel="classic" data-series-name="经典系列" data-color-prefix="CL" data-color-count="8" data-status="批发" data-package-label="默认普通包装" data-size-label="S/M/L/XL" data-price-label="渠道价顾问确认" data-card-href="sample.html" data-tone-list="祖母绿常规,香槟白金,奶油基础,雾蓝陈列">
            <div class="series-brief">
              <h3>经典系列</h3>
              <p>8 种颜色，仅限渠道批发客户，默认普通包装。适合拿样、门店试卖和入门陈列。</p>
            </div>
            <div class="catalog-product-grid" data-product-grid></div>
          </div>

          <div class="series-detail" data-series-panel="advanced" data-series-name="进阶系列" data-color-prefix="AD" data-color-count="19" data-status="渠道" data-package-label="默认精品包装" data-size-label="S/M/L/XL" data-price-label="渠道价顾问确认" data-card-href="quotation.html" data-tone-list="象牙花冠,森林松绿,玫瑰粉雾,奶油浮雕,雾蓝花瓣,胭脂珊瑚">
            <div class="series-brief">
              <h3>进阶系列</h3>
              <p>19 种颜色，渠道可采，默认精品包装。适合门店礼品区和节日基础陈列。</p>
            </div>
            <div class="catalog-product-grid" data-product-grid></div>
          </div>

          <div class="series-detail" data-series-panel="artisan" data-series-name="匠作系列" data-color-prefix="AR" data-color-count="73" data-status="渠道" data-package-label="默认礼盒包装" data-size-label="S/M/L/XL" data-price-label="渠道价顾问确认" data-card-href="display-plan.html" data-tone-list="莓红鎏金,雾蓝花冠,香槟金雕,深梅礼烛,宫廷红白,祖母绿金">
            <div class="series-brief">
              <h3>匠作系列</h3>
              <p>73 种颜色，渠道可采，默认礼盒包装。适合生活方式店、花店、婚庆和酒店礼品区。</p>
            </div>
            <div class="catalog-product-grid" data-product-grid></div>
          </div>

          <div class="series-detail" data-series-panel="festival" data-series-name="节日系列" data-color-prefix="FS" data-color-count="16" data-status="渠道" data-package-label="包装需手动确认" data-size-label="S/M/L/XL" data-price-label="渠道价顾问确认" data-card-href="quotation.html" data-tone-list="暖金节庆,红白限定,团圆组合,粉白纪念">
            <div class="series-brief">
              <h3>节日系列</h3>
              <p>16 种颜色，渠道可采，包装需按渠道活动手动确认。适合节点活动和企业礼采购。</p>
            </div>
            <div class="catalog-product-grid" data-product-grid></div>
          </div>
        </section>
      </div>

      <nav class="tabbar" aria-label="底部导航">
        <a class="tab-item" data-tab="home" href="home.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="m3 11 9-8 9 8"/><path d="M5 10v10h14V10"/></svg><span>首页</span></a>
        <a class="tab-item" data-tab="gift" href="gift.html#scene"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M20 12v8H4v-8"/><path d="M2 7h20v5H2z"/><path d="M12 22V7"/></svg><span>送礼</span></a>
        <a class="tab-item" data-tab="wholesale" href="wholesale.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 7h18v13H3z"/><path d="M7 7V4h10v3"/></svg><span>批发</span></a>
        <a class="tab-item" data-tab="cart" href="cart.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="9" cy="20" r="1"/><circle cx="17" cy="20" r="1"/><path d="M3 4h2l3 12h10l3-8H7"/></svg><span>购物车</span></a>
        <a class="tab-item" data-tab="mine" href="mine.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="8" r="4"/><path d="M4 22a8 8 0 0 1 16 0"/></svg><span>我的</span></a>
      </nav>
    </section>
  </main>
  <script src="assets/app.js"></script>
</body>
</html>
