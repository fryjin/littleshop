<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>门店陈列方案 · 香薰雕刻蜡烛</title>
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body data-page="display-plan">
  <main class="prototype-page">
    <section class="phone-shell" aria-label="门店陈列方案页面视觉稿">
      <div class="wx-status"><span>11:26</span><span class="wx-dots"><span></span><span></span><span></span></span></div>
      <header class="wx-header">
        <a class="icon-button" href="wholesale.html" aria-label="返回批发页"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="m15 18-6-6 6-6"/></svg></a>
        <div>
          <h1>门店陈列方案</h1>
          <span class="subtle-title">面积 · 预算 · 上架</span>
        </div>
        <div class="capsule" aria-label="微信胶囊按钮">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="5" cy="12" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="19" cy="12" r="1.5"/></svg>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="8"/></svg>
        </div>
      </header>

      <div class="screen-scroll has-cta">
        <section class="growth-hero">
          <p class="eyebrow">DISPLAY PLAN</p>
          <h2>让批发不只卖货，而是给门店一套能上架的方案。</h2>
          <p>按门店类型、面积和预算生成陈列组合，连接拿样包、报价单和素材下载。</p>
          <div class="hero-stat-row">
            <div class="hero-stat"><strong>6 款</strong><span>首轮陈列</span></div>
            <div class="hero-stat"><strong>3 层</strong><span>价格带</span></div>
            <div class="hero-stat"><strong>素材</strong><span>随方案给到</span></div>
          </div>
        </section>

        <section class="section">
          <div class="config-card">
            <h3>门店信息</h3>
            <div class="choice-grid" data-choice-group>
              <button class="choice-card" data-choice aria-pressed="true"><strong>礼品店 / 生活方式店</strong><span>需要礼盒和价格带清晰。</span></button>
              <button class="choice-card" data-choice aria-pressed="false"><strong>花店 / 婚庆</strong><span>需要色系统一和场景拍照感。</span></button>
            </div>
            <div class="segmented" data-choice-group style="margin-top: 12px;">
              <button class="segment active" data-choice aria-pressed="true">1 米陈列台</button>
              <button class="segment" data-choice aria-pressed="false">2 米货架</button>
              <button class="segment" data-choice aria-pressed="false">橱窗专区</button>
            </div>
          </div>
        </section>

        <section class="section">
          <div class="plan-card">
            <div class="plan-head">
              <h3>推荐陈列结构</h3>
              <span>¥330 起样</span>
            </div>
            <div class="shelf-map">
              <div class="shelf-slot berry"><strong>视觉焦点</strong><span>莓红 / 高仪式感</span></div>
              <div class="shelf-slot jade"><strong>主陈列</strong><span>青绿 / 金蓝 / 象牙</span></div>
              <div class="shelf-slot gold"><strong>礼盒区</strong><span>贺卡 / 包装 / 价格牌</span></div>
            </div>
          </div>
        </section>

        <section class="section">
          <div class="section-head">
            <h2 class="section-title serif">上架话术</h2>
            <a class="link-small" href="assets-download.html">下载素材</a>
          </div>
          <div class="mini-timeline">
            <div class="mini-step"><b>1</b><div><strong>先讲工艺</strong><span>每支通过多层彩蜡和手工刀法形成卷边纹理。</span></div></div>
            <div class="mini-step"><b>2</b><div><strong>再讲用途</strong><span>适合点燃，也适合作为礼品和空间陈列。</span></div></div>
            <div class="mini-step"><b>3</b><div><strong>最后给选择</strong><span>按预算分入门单品、标准礼盒和高端陈列。</span></div></div>
          </div>
        </section>
      </div>

      <div class="sticky-cta">
        <a class="btn ghost" href="quotation.html">生成报价</a>
        <button class="btn primary" data-toast="已模拟生成：门店陈列方案已更新">生成陈列方案</button>
      </div>
      <div class="toast" data-toast-host role="status" aria-live="polite"></div>
    </section>
  </main>
  <script src="assets/app.js"></script>
</body>
</html>
