<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">

<body data-page="catalog">
  <main class="prototype-page">
    <section class="phone-shell" aria-label="零售商品页面视觉稿">
      <div class="wx-status"><span>11:26</span><span class="wx-dots"><span></span><span></span><span></span></span></div>
      <header class="wx-header">
        <a class="icon-button" href="home.html" aria-label="返回首页"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="m15 18-6-6 6-6"/></svg></a>
        <div>
          <h1>全部商品</h1>
          <span class="subtle-title">进阶 · 匠作 · 节日</span>
        </div>
        <div class="capsule" aria-label="微信胶囊按钮">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="5" cy="12" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="19" cy="12" r="1.5"/></svg>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="8"/></svg>
        </div>
      </header>

      <div class="screen-scroll">
        <section class="section catalog-section">
          <div class="section-head">
            <div>
              <h2 class="section-title serif">商品系列</h2>
              <p class="catalog-context">默认零售买家可浏览进阶、匠作和节日系列；渠道专属基础线不在这里展示。</p>
            </div>
          </div>

          <div class="series-grid" data-series-tabs aria-label="零售商品系列">
            <button class="series-card active" type="button" data-series-card="advanced" aria-pressed="true">
              <span class="series-kicker">19 色</span>
              <strong>进阶</strong>
              <small>精品包装</small>
            </button>
            <button class="series-card" type="button" data-series-card="artisan" aria-pressed="false">
              <span class="series-kicker">73 色</span>
              <strong>匠作</strong>
              <small>礼盒包装</small>
            </button>
            <button class="series-card" type="button" data-series-card="festival" aria-pressed="false">
              <span class="series-kicker">16 色</span>
              <strong>节日</strong>
              <small>包装手选</small>
            </button>
          </div>

          <div class="series-detail active" data-series-panel="advanced" data-series-name="进阶系列" data-color-prefix="AD" data-color-count="19" data-status="零售" data-package-label="默认精品包装" data-size-label="S/M/L/XL" data-price-label="零售价待确认" data-card-href="product.html" data-action-label="加购" data-tone-list="象牙花冠,森林松绿,玫瑰粉雾,奶油浮雕,雾蓝花瓣,胭脂珊瑚">
            <div class="series-brief">
              <h3>进阶系列</h3>
              <p>19 种颜色，默认精品包装，可升级礼盒包装。适合生日、答谢、乔迁和日常节日礼。</p>
            </div>
            <div class="catalog-filter-strip" data-filter-group="advanced" aria-label="进阶系列筛选">
              <button class="filter-chip active" type="button" data-filter-value="all" aria-pressed="true">全部</button>
              <button class="filter-chip" type="button" data-filter-value="birthday" aria-pressed="false">生日答谢</button>
              <button class="filter-chip" type="button" data-filter-value="daily" aria-pressed="false">乔迁日常</button>
              <button class="filter-chip" type="button" data-filter-value="light" aria-pressed="false">浅色系</button>
              <button class="filter-chip" type="button" data-filter-value="deep" aria-pressed="false">深色系</button>
              <button class="filter-chip" type="button" data-filter-value="giftbox" aria-pressed="false">可升礼盒</button>
            </div>
            <div class="catalog-product-grid" data-product-grid></div>
          </div>

          <div class="series-detail" data-series-panel="artisan" data-series-name="匠作系列" data-color-prefix="AR" data-color-count="73" data-status="零售" data-package-label="默认礼盒包装" data-size-label="S/M/L/XL" data-price-label="零售价待确认" data-card-href="product.html" data-action-label="加购" data-tone-list="莓红鎏金,雾蓝花冠,香槟金雕,深梅礼烛,宫廷红白,祖母绿金">
            <div class="series-brief">
              <h3>匠作系列</h3>
              <p>73 种颜色，默认礼盒包装。颜色最完整、雕花选择最丰富，适合重要关系、高端空间礼和陈列型礼品。</p>
            </div>
            <div class="catalog-filter-strip" data-filter-group="artisan" aria-label="匠作系列筛选">
              <button class="filter-chip active" type="button" data-filter-value="all" aria-pressed="true">全部</button>
              <button class="filter-chip" type="button" data-filter-value="important" aria-pressed="false">重要关系</button>
              <button class="filter-chip" type="button" data-filter-value="display" aria-pressed="false">高端陈列</button>
              <button class="filter-chip" type="button" data-filter-value="giftbox" aria-pressed="false">礼盒默认</button>
              <button class="filter-chip" type="button" data-filter-value="warm" aria-pressed="false">暖色系</button>
              <button class="filter-chip" type="button" data-filter-value="cool" aria-pressed="false">冷色系</button>
            </div>
            <div class="catalog-product-grid" data-product-grid></div>
          </div>

          <div class="series-detail" data-series-panel="festival" data-series-name="节日系列" data-color-prefix="FS" data-color-count="16" data-status="零售" data-package-label="包装需手动选择" data-size-label="S/M/L/XL" data-price-label="零售价待确认" data-card-href="product.html" data-action-label="选包装" data-tone-list="暖金节庆,红白限定,团圆组合,粉白纪念">
            <div class="series-brief">
              <h3>节日系列</h3>
              <p>16 种颜色，需手动选择普通、精品或礼盒包装。适合春节、纪念日、中秋、圣诞和企业节点礼。</p>
            </div>
            <div class="catalog-filter-strip" data-filter-group="festival" aria-label="节日系列筛选">
              <button class="filter-chip active" type="button" data-filter-value="all" aria-pressed="true">全部</button>
              <button class="filter-chip" type="button" data-filter-value="spring" aria-pressed="false">春节</button>
              <button class="filter-chip" type="button" data-filter-value="lantern" aria-pressed="false">元宵</button>
              <button class="filter-chip" type="button" data-filter-value="mother" aria-pressed="false">母亲节/女神节</button>
              <button class="filter-chip" type="button" data-filter-value="romance" aria-pressed="false">520/七夕</button>
              <button class="filter-chip" type="button" data-filter-value="dragonboat" aria-pressed="false">端午</button>
              <button class="filter-chip" type="button" data-filter-value="midautumn" aria-pressed="false">中秋</button>
              <button class="filter-chip" type="button" data-filter-value="teacher" aria-pressed="false">教师节</button>
              <button class="filter-chip" type="button" data-filter-value="yearend" aria-pressed="false">圣诞/年末</button>
            </div>
            <div class="catalog-product-grid" data-product-grid></div>
          </div>
        </section>
      </div>

      <nav class="tabbar" aria-label="底部导航">
        <a class="tab-item" data-tab="home" href="home.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="m3 11 9-8 9 8"/><path d="M5 10v10h14V10"/></svg><span>首页</span></a>
        <a class="tab-item" data-tab="gift" href="gift.html#scene"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M20 12v8H4v-8"/><path d="M2 7h20v5H2z"/><path d="M12 22V7"/></svg><span>送礼</span></a>
        <a class="tab-item" data-tab="catalog" href="catalog.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M4 4h7v7H4z"/><path d="M13 4h7v7h-7z"/><path d="M4 13h7v7H4z"/><path d="M13 13h7v7h-7z"/></svg><span>商品</span></a>

        <a class="tab-item" data-tab="mine" href="mine.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="8" r="4"/><path d="M4 22a8 8 0 0 1 16 0"/></svg><span>我的</span></a>
      </nav>
      <div class="toast" data-toast-host role="status" aria-live="polite"></div>
