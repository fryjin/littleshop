<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>购物车 · 香薰雕刻蜡烛</title>
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body data-page="cart">
  <main class="prototype-page">
    <section class="phone-shell" aria-label="购物车页面视觉稿">
      <div class="wx-status"><span>11:26</span><span class="wx-dots"><span></span><span></span><span></span></span></div>
      <header class="wx-header">
        <a class="icon-button" href="product.html" aria-label="返回商品详情"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="m15 18-6-6 6-6"/></svg></a>
        <div>
          <h1>确认礼品订单</h1>
          <span class="subtle-title">下单前检查</span>
        </div>
        <div class="capsule" aria-label="微信胶囊按钮">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="5" cy="12" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="19" cy="12" r="1.5"/></svg>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="8"/></svg>
        </div>
      </header>

      <div class="screen-scroll has-cta">
        <section class="section" style="margin-top: 12px;">
          <div class="cart-list">
            <article class="cart-item">
              <div class="product-media photo-media contain"><img src="assets/product-berry-candle.png" alt="购物车中的莓红雕刻蜡烛"></div>
              <div class="cart-info">
                <div class="tag-row"><span class="tag berry">礼盒</span><span class="tag">中号</span></div>
                <h3>莓果洛可可 · 手工雕刻香薰蜡烛</h3>
                <p>香型：玫瑰木 / 包装：硬质礼盒 + 空白贺卡</p>
                <div class="qty-row">
                  <div class="price-line">¥328</div>
                  <div class="qty-control" aria-label="数量选择"><button aria-label="减少数量">−</button><span>1</span><button aria-label="增加数量">+</button></div>
                </div>
              </div>
            </article>
          </div>
        </section>

        <section class="section">
          <div class="info-card">
            <h3>礼品服务</h3>
            <div class="choice-grid" data-choice-group="multi">
              <button class="choice-card" data-choice aria-pressed="true"><strong>礼盒包装</strong><span>硬质盒、缓冲纸、防损外箱。</span></button>
              <button class="choice-card" data-choice aria-pressed="true"><strong>空白贺卡</strong><span>避免机器字迹，支持手写赠言。</span></button>
            </div>
          </div>
          <div class="info-card">
            <h3>配送与售后</h3>
            <p>预计 48 小时内发货。雕刻卷边为易损细节，默认加固包装；签收后如发现运输损坏，可联系客服处理。</p>
          </div>
        </section>

        <section class="section">
          <div class="info-card">
            <h3>订单金额</h3>
            <div class="summary-row"><span>商品小计</span><strong>¥328</strong></div>
            <div class="summary-row"><span>礼盒升级</span><strong>¥0</strong></div>
            <div class="summary-row"><span>运费</span><strong>¥0</strong></div>
            <div class="summary-row"><span>应付合计</span><strong style="color: var(--berry); font-size: 18px;">¥328</strong></div>
          </div>
        </section>

        <section class="section">
          <div class="info-card">
            <h3>成交前降低疑虑</h3>
            <p>如果不确定色系、尺寸或送礼是否合适，可以先咨询搭配顾问。客服话术入口放在支付前，减少用户返回商品页的流失。</p>
          </div>
        </section>
      </div>

      <div class="sticky-cta">
        <a class="btn ghost" href="service.html">问顾问</a>
        <button class="btn primary" data-toast="已模拟微信支付确认流程">微信支付 ¥328</button>
      </div>
      <div class="toast" data-toast-host role="status" aria-live="polite"></div>
    </section>
  </main>
  <script src="assets/app.js"></script>
</body>
</html>
