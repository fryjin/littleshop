<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>拿样包 · 香薰雕刻蜡烛</title>
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body data-page="sample">
  <main class="prototype-page">
    <section class="phone-shell" aria-label="拿样包页面视觉稿">
      <div class="wx-status"><span>11:26</span><span class="wx-dots"><span></span><span></span><span></span></span></div>
      <header class="wx-header">
        <a class="icon-button" href="wholesale.html" aria-label="返回批发页"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="m15 18-6-6 6-6"/></svg></a>
        <div>
          <h1>拿样包</h1>
          <span class="subtle-title">先试卖，再进货</span>
        </div>
        <div class="capsule" aria-label="微信胶囊按钮">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="5" cy="12" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="19" cy="12" r="1.5"/></svg>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="8"/></svg>
        </div>
      </header>

      <div class="screen-scroll has-cta">
        <section class="gift-hero">
          <p class="eyebrow" style="color: var(--berry);">SAMPLE KIT</p>
          <h2>让渠道客户先拿到“能陈列、能发图”的样品。</h2>
          <p>拿样包不是普通商品列表，而是帮客户降低第一次进货风险，并同步给到销售素材和陈列建议。</p>
        </section>

        <section class="section">
          <div class="section-head">
            <h2 class="section-title serif">选择拿样组合</h2>
            <span class="section-note">默认推荐 6 款热卖包</span>
          </div>
          <div class="choice-grid" data-choice-group>
            <button class="sample-package" data-choice aria-pressed="false">
              <div class="product-media photo-media contain"><img src="assets/product-berry-candle.png" alt="3 款体验拿样包"></div>
              <div class="sample-info">
                <div class="tag-row"><span class="tag">入门</span></div>
                <h3>3 款体验包</h3>
                <p>适合初次了解工艺和客单价，便于小范围试卖。</p>
                <div class="price-line">¥165 <small>参考拿样</small></div>
              </div>
            </button>
            <button class="sample-package featured" data-choice aria-pressed="true">
              <div class="product-media photo-media"><img src="assets/wholesale-display.png" alt="6 款热卖拿样包"></div>
              <div class="sample-info">
                <div class="tag-row"><span class="tag berry">推荐</span><span class="tag">热卖</span></div>
                <h3>6 款热卖包</h3>
                <p>覆盖莓红、金蓝、青绿等主力色系，适合门店首轮陈列。</p>
                <div class="price-line">¥330 <small>参考拿样</small></div>
              </div>
            </button>
            <button class="sample-package" data-choice aria-pressed="false">
              <div class="product-media photo-media"><img src="assets/hero-candle-collection.png" alt="12 款陈列拿样包"></div>
              <div class="sample-info">
                <div class="tag-row"><span class="tag">完整陈列</span></div>
                <h3>12 款陈列包</h3>
                <p>适合礼品店、集合店和民宿空间做完整展示墙。</p>
                <div class="price-line">¥660 <small>参考拿样</small></div>
              </div>
            </button>
          </div>
        </section>

        <section class="section">
          <div class="section-head">
            <h2 class="section-title serif">随样支持</h2>
          </div>
          <div class="support-grid">
            <div class="support-tile"><strong>产品图包</strong><span>详情图、场景图、朋友圈素材。</span></div>
            <div class="support-tile"><strong>陈列建议</strong><span>按色系和价格带组合上架。</span></div>
            <div class="support-tile"><strong>零售话术</strong><span>解释工艺、礼品价值和运输保障。</span></div>
            <div class="support-tile"><strong>节日选品</strong><span>生日、婚礼、节庆批量采购建议。</span></div>
          </div>
        </section>

        <section class="section">
          <div class="section-head">
            <h2 class="section-title serif">拿样后动作</h2>
            <span class="section-note">从样品到试卖</span>
          </div>
          <div class="support-grid">
            <a class="support-tile" href="assets-download.html"><strong>下载素材</strong><span>商品图、海报、朋友圈文案。</span></a>
            <a class="support-tile" href="quotation.html"><strong>生成报价</strong><span>申请后确认渠道价和包装。</span></a>
            <a class="support-tile" href="wholesale-catalog.html"><strong>批发手册</strong><span>查看经典系列和渠道可采系列。</span></a>
            <a class="support-tile" href="display-plan.html"><strong>陈列方案</strong><span>按门店面积生成上架组合。</span></a>
          </div>
        </section>

        <section class="section">
          <form class="form-card">
            <div class="field"><label for="sample-name">联系人</label><input id="sample-name" autocomplete="name" placeholder="请输入姓名"></div>
            <div class="field"><label for="sample-phone">微信 / 手机号</label><input id="sample-phone" inputmode="tel" autocomplete="tel" placeholder="用于确认拿样库存"></div>
            <div class="field"><label for="sample-city">所在城市</label><input id="sample-city" placeholder="例如：杭州"></div>
          </form>
        </section>
      </div>

      <div class="sticky-cta">
        <a class="btn ghost" href="service.html">咨询拿样</a>
        <button class="btn primary" data-toast="已模拟提交：顾问将确认拿样组合和渠道价">提交拿样申请</button>
      </div>
      <div class="toast" data-toast-host role="status" aria-live="polite"></div>
    </section>
  </main>
  <script src="assets/app.js"></script>
</body>
</html>
